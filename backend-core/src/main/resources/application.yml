spring:
  application:
    name: domovenok-backend-core

  datasource:
    url: jdbc:postgresql://localhost:5432/domovenok
    username: domovenok
    password: domovenok

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: 8080

# Токен бота MAX (платформа для партнёров → Чат-боты → Интеграция). Нужен для валидации initData.
max:
  bot:
    token: ${MAX_BOT_TOKEN:}

# CORS: список origins/паттернов. Для GitHub Pages → запросы на localhost:8080 нужен origin вида https://<user>.github.io (паттерн https://*.github.io).
# Полная замена списка: переменная окружения CORS_ALLOWED_ORIGINS (через запятую).
app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - http://localhost:4173
      - http://127.0.0.1:5173
      - http://127.0.0.1:3000
      - http://127.0.0.1:4173
      - https://*.github.io
      # Мини-приложение в клиенте MAX часто отдаёт Origin с домена MAX (не github.io):
      - https://max.ru
      - https://*.max.ru

