spring:
  application:
    name: domovenok-backend-core

  datasource:
    url: jdbc:postgresql://localhost:5432/domovenok
    username: domovenok
    password: domovenok

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: 8080

# Токен бота MAX (платформа для партнёров → Чат-боты → Интеграция). Нужен для валидации initData.
max:
  bot:
    token: ${MAX_BOT_TOKEN:}

# CORS: через запятую origins или паттерны (паттерны поддерживаются для GitHub Pages).
# По умолчанию: localhost для разработки и https://*.github.io для деплоя на GitHub Pages.
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,https://*.github.io}

