spring:
  application:
    name: domovenok-backend-core

  datasource:
    url: jdbc:postgresql://localhost:5432/domovenok
    username: domovenok
    password: domovenok

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: 8080

# Токен бота MAX (платформа для партнёров → Чат-боты → Интеграция). Нужен для валидации initData.
max:
  bot:
    token: ${MAX_BOT_TOKEN:}

# CORS: укажи через запятую origins мини-приложения (HTTPS URL деплоя и при необходимости http://localhost:5173)
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

