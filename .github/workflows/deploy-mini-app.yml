# Сборка и деплой mini-app на GitHub Pages. API — localhost:8080 (бэкенд поднимаешь локально).
# В настройках репо: Settings → Pages → Source = GitHub Actions.

name: Build and deploy mini-app (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'mini-app/**'
      - '.github/workflows/deploy-mini-app.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: mini-app

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: mini-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build mini-app (localhost API)
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8080

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: mini-app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
