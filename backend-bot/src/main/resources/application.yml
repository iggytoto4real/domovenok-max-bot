spring:
  application:
    name: domovenok-backend-bot

server:
  port: 8081

# Токен из панели MAX (Чат-боты → Интеграция). Для запуска с локали задай переменную MAX_BOT_TOKEN.
domovenok:
  max:
    bot:
      token: ${MAX_BOT_TOKEN:}
      api-base-url: https://platform-api.max.ru
      core-base-url: http://localhost:8080
